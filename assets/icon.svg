<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Deep Obsidian Black Background Gradient -->
    <linearGradient id="blackBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181B26"/>
      <stop offset="50%" stop-color="#0B0D13"/>
      <stop offset="100%" stop-color="#040508"/>
    </linearGradient>

    <!-- Champagne Gold Metallic Rim -->
    <linearGradient id="realGoldRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5D6"/>
      <stop offset="50%" stop-color="#C5A059"/>
      <stop offset="100%" stop-color="#735B28"/>
    </linearGradient>

    <!-- Realistic Hand Skin/Glove Gradient -->
    <linearGradient id="realSkinGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#EBD8C3"/>
      <stop offset="35%" stop-color="#CBB196"/>
      <stop offset="70%" stop-color="#9C8065"/>
      <stop offset="100%" stop-color="#5E4935"/>
    </linearGradient>

    <!-- Faint Blue Azure Diamond Gradient -->
    <linearGradient id="realDiamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2FBFF"/>
      <stop offset="40%" stop-color="#5CE0FF"/>
      <stop offset="100%" stop-color="#00A5DC"/>
    </linearGradient>

    <!-- Subtle Cyan Reflection Filter -->
    <filter id="realCyanReflect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Black-Themed Circular Icon Container -->
  <g id="realisticHandIcon" opacity="0.7">
    <!-- Deep Black Circle Background & Gold Border Ring -->
    <circle cx="50" cy="50" r="46" fill="url(#blackBgGrad)" stroke="url(#realGoldRim)" stroke-width="2.5"/>

    <!-- FAINT BLUE AZURE DIAMOND (RESTING IN PALM) -->
    <g id="realAzureDiamond">
      <!-- Main Diamond Body -->
      <polygon points="50,18 68,30 50,52 32,30" fill="url(#realDiamondGrad)" opacity="0.9"/>
      <!-- Top Crown Facet -->
      <polygon points="39,30 50,18 61,30 50,25" fill="#FFFFFF" opacity="0.95"/>
      <!-- Facet Shades & Reflections -->
      <polygon points="32,30 39,30 50,52" fill="#0090C4" opacity="0.5"/>
      <polygon points="68,30 61,30 50,52" fill="#0090C4" opacity="0.5"/>
      <line x1="50" y1="18" x2="50" y2="52" stroke="#FFFFFF" stroke-width="1.2" opacity="0.75"/>
    </g>

    <!-- REALISTIC HUMAN HAND (ANATOMICAL SHAPE, FINGERS, KNUCKLES, WRIST) -->
    <g id="realHumanHand">
      <!-- Forearm & Heel of Palm -->
      <path d="M 40 86 C 40 76, 38 68, 36 62 L 64 62 C 62 68, 60 76, 60 86 Z" fill="url(#realSkinGrad)"/>
      
      <!-- Gold Wrist Cuff / Sleeve Detail -->
      <path d="M 36 64 C 45 67, 55 67, 64 64" stroke="url(#realGoldRim)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Palm Base & Muscle Contours -->
      <path d="M 36 62 C 34 54, 38 46, 50 46 C 62 46, 66 54, 64 62 Z" fill="url(#realSkinGrad)"/>

      <!-- Pinky Finger (Outer Right Edge) -->
      <path d="M 64 60 C 72 56, 75 44, 70 38 C 67 40, 66 46, 62 52 Z" fill="url(#realSkinGrad)"/>

      <!-- Ring Finger (Behind Middle Finger) -->
      <path d="M 62 55 C 72 48, 73 34, 66 28 C 63 31, 63 38, 60 46 Z" fill="url(#realSkinGrad)"/>

      <!-- Middle Finger (Tallest, Curving Over Right Side of Diamond) -->
      <path d="M 58 50 C 70 42, 70 26, 62 20 C 58 24, 58 32, 54 42 Z" fill="url(#realSkinGrad)"/>

      <!-- Index Finger (Front Right, Gently Cupping Diamond Side) -->
      <path d="M 54 48 C 64 40, 63 28, 56 24 C 53 27, 53 34, 50 42 Z" fill="url(#realSkinGrad)"/>

      <!-- Thumb (Left Side Anatomical Thumb with 2 Joints) -->
      <path d="M 38 58 C 28 52, 24 38, 30 30 C 33 30, 35 36, 38 42 Z" fill="url(#realSkinGrad)"/>
      <!-- Thumb Joint Crease -->
      <path d="M 31 38 C 33 40, 35 41, 37 42" stroke="#5E4935" stroke-width="1" fill="none" opacity="0.6"/>

      <!-- Finger Joint Folds & Knuckle Creases -->
      <path d="M 56 31 C 58 33, 60 34, 61 35" stroke="#5E4935" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M 60 28 C 62 30, 64 31, 65 32" stroke="#5E4935" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M 64 35 C 66 37, 67 38, 68 39" stroke="#5E4935" stroke-width="1" fill="none" opacity="0.5"/>

      <!-- Realistic Skin Highlights -->
      <path d="M 29 32 C 31 35, 33 39, 34 42" stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.45"/>
      <path d="M 54 26 C 52 30, 51 35, 49 40" stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.45"/>
      <path d="M 60 22 C 57 27, 56 32, 53 38" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.35"/>

      <!-- Faint Cyan Diamond Light Reflection on Palm -->
      <path d="M 40 44 C 46 42, 54 42, 58 46" stroke="#75E2FF" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#realCyanReflect)"/>
    </g>
  </g>
</svg>
